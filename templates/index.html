<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <main class="container">
        <h1>🎲 로또 번호 생성기</h1>

        <form class="lotto-form" action="/result" method="post">
            <label for="game_count">
                몇 게임을 구매하시나요?
                <input type="number" id="game_count" name="game_count" min="1" max="100" value="5" required>
                <span class="hint">1~100 게임</span>
            </label>
            <button type="submit">번호 생성하기</button>
        </form>
    </main>
</body>
</html>
