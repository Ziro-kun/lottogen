<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <h1>🎲 로또 번호 생성기</h1>

    <form action="/result" method="post">
        <label>
            몇 게임을 구매하시나요?
            <input type="number" name="game_count" min="1" max="20" required>
        </label>
        <br><br>
        <button type="submit">번호 생성하기</button>
    </form>
</body>
</html>
